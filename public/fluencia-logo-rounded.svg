<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="30" fill="#00a870"/>
  
  <!-- F letter -->
  <text x="100" y="145" 
        font-family="Georgia, serif" 
        font-size="120" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">F</text>
  
  <!-- Green accent bar -->
  <rect x="45" y="45" width="50" height="12" rx="6" fill="#008a5a"/>
  
  <!-- Gold dot -->
  <circle cx="150" cy="50" r="14" fill="#c9963c"/>
</svg>