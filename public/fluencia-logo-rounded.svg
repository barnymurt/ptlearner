<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="30" fill="#00a870"/>
  
  <!-- Blackletter F main stem -->
  <path d="M75 35 L75 165" 
        stroke="white" 
        stroke-width="14" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Top crossbar with curl -->
  <path d="M75 35 L140 35 Q160 40 150 55 Q145 45 125 45" 
        stroke="white" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Middle crossbar with curl -->
  <path d="M75 100 L135 100 Q150 105 143 118 Q137 110 120 112" 
        stroke="white" 
        stroke-width="10" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Gold accent bar -->
  <rect x="35" y="35" width="40" height="10" rx="5" fill="#008a5a"/>
  
  <!-- Gold accent dot -->
  <circle cx="155" cy="45" r="12" fill="#c9963c" />
</svg>