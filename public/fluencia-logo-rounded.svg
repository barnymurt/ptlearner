<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="30" fill="#00a870"/>
  
  <!-- F with accent -->
  <text x="70" y="130" 
        font-family="Georgia, serif" 
        font-size="85" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">F</text>
  
  <!-- Acute accent -->
  <text x="125" y="115" 
        font-family="Georgia, serif" 
        font-size="45" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">ú</text>
  
  <!-- lência -->
  <text x="122" y="150" 
        font-family="Georgia, serif" 
        font-size="45" 
        fill="white" 
        text-anchor="middle">ência</text>
  
  <!-- Gold accent bar -->
  <rect x="40" y="40" width="45" height="10" rx="5" fill="#008a5a"/>
  
  <!-- Gold dot -->
  <circle cx="150" cy="45" r="12" fill="#c9963c"/>
</svg>