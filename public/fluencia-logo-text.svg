  <text x="15" y="70" 
        font-family="Georgia, serif" 
        font-size="65" 
        font-weight="bold" 
        fill="#00a870">F</text>
  
  <!-- Acute accent -->
  <text x="58" y="52" 
        font-family="Georgia, serif" 
        font-size="30" 
        font-weight="bold" 
        fill="#00a870">ú</text>
  
  <!-- lência -->
  <text x="70" y="70" 
        font-family="Georgia, serif" 
        font-size="50" 
        fill="#1a1a1a">luência</text>
  
