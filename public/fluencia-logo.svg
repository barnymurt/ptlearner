<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#00a870" />
  
  <!-- Stylized F with accent mark -->
  <text x="75" y="130" 
        font-family="Georgia, serif" 
        font-size="90" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">F</text>
  
  <!-- Acute accent on ú -->
  <text x="135" y="115" 
        font-family="Georgia, serif" 
        font-size="50" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">ú</text>
  
  <!-- lência -->
  <text x="130" y="150" 
        font-family="Georgia, serif" 
        font-size="50" 
        fill="white" 
        text-anchor="middle">ência</text>
  
  <!-- Gold accent dot (Portuguese flag reference) -->
  <circle cx="155" cy="55" r="16" fill="#c9963c" />
</svg>